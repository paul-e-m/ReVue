<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReVue Judge</title>
    <link rel="stylesheet" href="ReVue-Judge.css" />
</head>
<body>
    <div class="reVueJudgeShell" id="reVueJudgeShell">
        <div class="reVueJudgeLayout" id="reVueJudgeTopRow">
            <aside id="elementRailColumn" class="elementRailColumn hidden" aria-label="Elements">
                <div id="reVueJudgeAutoplayRow" class="reVueJudgeAutoplayRow">
                    <span id="reVueJudgeAutoplayLabel" class="reVueJudgeAutoplayLabel" data-judge-video-replay-i18n="autoplayClip">Autoplay Clip</span>
                    <label class="reVueJudgeAutoplaySwitch">
                        <input type="checkbox" id="reVueJudgeAutoplayToggle" aria-label="Autoplay Clip" data-judge-video-replay-i18n-aria="autoplayClip" />
                        <span class="reVueJudgeAutoplaySlider"></span>
                    </label>
                </div>
                <div id="elementRail" class="elementRail"></div>
            </aside>

            <div id="videoPane" class="videoPane">
                <div id="reVueJudgeSessionInfo" class="reVueJudgeSessionInfo hidden">
                    <span id="reVueJudgeSessionInfoText" class="reVueJudgeSessionInfoText"></span>
                    <span id="reVueJudgeServerStatus" class="reVueJudgeServerStatus" title="Server status" aria-label="Server status">
                        <span id="reVueJudgeServerStatusDot" class="replayPingDot idle" aria-hidden="true"></span>
                    </span>
                    <button id="reVueJudgeSessionRefreshBtn" class="reVueJudgeSessionRefreshBtn" type="button" title="Refresh" aria-label="Refresh">
                        <img class="reVueJudgeSessionRefreshIcon" src="/img/buttons/refresh.png" alt="" draggable="false" />
                    </button>
                    <select id="reVueJudgeLanguageSelect" class="reVueJudgeLanguageSelect" aria-label="Language">
                        <option value="en" data-judge-video-replay-i18n="languageEnglish">English</option>
                        <option value="fr" data-judge-video-replay-i18n="languageFrench">Français</option>
                    </select>
                    <button id="reVueJudgeSettingsBtn" class="reVueJudgeSessionSettingsBtn" type="button" title="Settings" aria-label="Settings">
                        <img class="reVueJudgeSessionSettingsIcon" src="/img/buttons/settings.png" alt="" draggable="false" />
                    </button>
                    <button id="reVueJudgeLogoBtn" class="reVueJudgeSessionLogoBtn" type="button" title="Logo Screen" aria-label="Logo Screen">
                        <img class="reVueJudgeSessionLogoIcon" src="/img/logo.png" alt="" draggable="false" />
                    </button>
                </div>
                <video id="v" class="reVueJudgeVideo" playsinline muted preload="metadata"></video>
                <div id="emptyState" class="emptyState hidden">
                    <div class="emptyStateCard">
                        <div id="emptyStateMessage" class="emptyStateMessage">There are no video clips currently available</div>
                    </div>
                </div>
            </div>
            <div id="timelineArea" class="timelineArea hidden" aria-label="Video timeline" aria-hidden="true">
                <div id="timeline" class="timeline">
                    <div id="stopwatchRange" class="stopwatchRange hidden"></div>
                    <div id="elementMarkers" class="elementMarkers"></div>
                    <div class="timelineClip">
                        <div id="timelineTicks" class="timelineTicks"></div>
                    </div>
                    <div id="stopwatchMarker" class="stopwatchMarker hidden"></div>
                    <div id="playhead" class="playhead"></div>
                </div>
                <div id="stopwatchIndicator" class="stopwatchIndicator hidden">00:00:00</div>
                <div id="outOfClipIndicator" class="outOfClipIndicator hidden">-00:00:00</div>
                <div id="timelineLabels" class="timelineLabels"></div>
            </div>

            <div id="transportRow" class="transportRow">
                <button id="fullRecordingBtn" class="transportBtn fullRecordingBtn hidden" type="button" disabled title="Full Recording" aria-label="Full Recording" aria-pressed="false">
                    <img class="fullRecordingIcon" src="/img/buttons/video_icon.png" alt="" draggable="false" />
                </button>

                <button id="stopwatchBtn" class="transportBtn stopwatchBtn" type="button" disabled title="Timer On" aria-label="Timer On" aria-pressed="false">
                    <img class="stopwatchBtnIcon" src="/img/buttons/stopwatch.png" alt="" draggable="false" />
                </button>

                <div id="timingPresetButtons" class="timingPresetButtons hidden" aria-label="Timing presets">
                    <button class="transportBtn timingPresetBtn" type="button" data-timing-seconds="8" disabled title="Set timer to 8 seconds" aria-label="Set timer to 8 seconds">
                        <span class="transportBtnLabel">8</span>
                    </button>
                    <button class="transportBtn timingPresetBtn" type="button" data-timing-seconds="10" disabled title="Set timer to 10 seconds" aria-label="Set timer to 10 seconds">
                        <span class="transportBtnLabel">10</span>
                    </button>
                    <button class="transportBtn timingPresetBtn" type="button" data-timing-seconds="13" disabled title="Set timer to 13 seconds" aria-label="Set timer to 13 seconds">
                        <span class="transportBtnLabel">13</span>
                    </button>
                </div>

                <div class="transportButtons" aria-label="Playback controls">
                    <button id="rew10" class="transportBtn jumpBtn" type="button" disabled title="Back 10 seconds" aria-label="Back 10 seconds">
                        <span class="transportBtnLabel">-10s</span>
                    </button>
                    <button id="rew3" class="transportBtn jumpBtn" type="button" disabled title="Back 3 seconds" aria-label="Back 3 seconds">
                        <span class="transportBtnLabel">-3s</span>
                    </button>

                    <button id="playPause" class="transportBtn iconBtn playPauseBtn isPlay" type="button" disabled title="Play" aria-label="Play">
                        <span class="playPauseGlyph" aria-hidden="true"></span>
                    </button>

                    <button id="fwd3" class="transportBtn jumpBtn" type="button" disabled title="Forward 3 seconds" aria-label="Forward 3 seconds">
                        <span class="transportBtnLabel">+3s</span>
                    </button>
                    <button id="fwd10" class="transportBtn jumpBtn" type="button" disabled title="Forward 10 seconds" aria-label="Forward 10 seconds">
                        <span class="transportBtnLabel">+10s</span>
                    </button>
                </div>

                <div id="relativeIndicator" class="relativeIndicator">0:00:00</div>
            </div>
        </div>
    </div>

    <div id="brandOverlay" class="brandOverlay hidden" aria-hidden="true">
        <img class="brandOverlayLogo" src="/img/logo.png" alt="ReVue Judge" draggable="false" />
        <div class="brandOverlayMessage">CLICK ANYWHERE TO RETURN TO REVUE JUDGE / CLIQUEZ N'IMPORTE OÃ™ POUR REVENIR Ã€ REVUE JUDGE</div>
    </div>

    <div id="shortcutOverlay" class="shortcutOverlay hidden" aria-hidden="true">
        <div class="shortcutCard" role="dialog" aria-modal="false" aria-labelledby="shortcutTitle">
            <div id="shortcutTitle" class="shortcutTitle" data-judge-video-replay-i18n="shortcutTitle">Keyboard Shortcuts</div>
            <div class="shortcutFrame">
                <div id="shortcutList" class="shortcutList"></div>
            </div>
            <div class="shortcutFooter">
                <div id="shortcutVersion" class="shortcutVersion"></div>
            </div>
        </div>
    </div>

    <div id="reVueJudgeSettingsOverlay" class="reVueJudgeSettingsOverlay hidden" aria-hidden="true">
        <div class="reVueJudgeSettingsDialog" role="dialog" aria-modal="true" aria-labelledby="reVueJudgeSettingsTitle">
            <div class="reVueJudgeSettingsHeader">
                <h2 id="reVueJudgeSettingsTitle" data-judge-video-replay-i18n="settings">ReVue Judge Settings</h2>
            </div>

            <div class="reVueJudgeSettingsBody">
                <section class="reVueJudgeSettingsSection">
                    <h3 data-judge-video-replay-i18n="general">General</h3>
                    <label class="reVueJudgeSettingsField" for="reVueJudgeSettingsRole">
                        <span data-judge-video-replay-i18n="role">Role</span>
                        <select id="reVueJudgeSettingsRole">
                            <option value="judge" data-judge-video-replay-i18n="roleJudge">Judge</option>
                            <option value="referee" data-judge-video-replay-i18n="roleReferee">Referee</option>
                        </select>
                    </label>
                    <label class="reVueJudgeSettingsField" for="reVueJudgeSettingsUiZoomPercent">
                        <span>
                            <strong data-judge-video-replay-i18n="uiZoom">UI Zoom (%)</strong>
                            <small data-judge-video-replay-i18n="uiZoomHelp">Default window zoom level. 100 = normal size.</small>
                        </span>
                        <input id="reVueJudgeSettingsUiZoomPercent" type="number" min="50" max="150" step="5" />
                    </label>
                </section>

                <section class="reVueJudgeSettingsSection">
                    <h3 data-judge-video-replay-i18n="connection">Connection</h3>
                    <label class="reVueJudgeSettingsField" for="reVueJudgeSettingsServerIp">
                        <span data-judge-video-replay-i18n="serverIp">Server IP address (VRO laptop)</span>
                        <input id="reVueJudgeSettingsServerIp" type="text" spellcheck="false" />
                    </label>
                </section>
            </div>

            <div class="reVueJudgeSettingsFooter">
                <div id="reVueJudgeSettingsStatus" class="reVueJudgeSettingsStatus"></div>
                <button id="reVueJudgeSettingsSaveBtn" class="reVueJudgeSettingsSaveBtn" type="button" data-judge-video-replay-i18n="saveAndClose">Save and Close</button>
            </div>
        </div>
    </div>

    <script src="ReVue-Judge-i18n.js"></script>
    <script src="ReVue-Judge.js"></script>
</body>
</html>
